name: CI

# Runs the test suite on every push and PR, and (on pushes to the default
# branch or a version tag) builds a multi-arch image and publishes it to
# this repo's GitHub Container Registry package at
# ghcr.io/<owner>/<repo>. No secrets to configure — the build authenticates
# with the workflow's built-in GITHUB_TOKEN.
#
# First-run note: a freshly-created GHCR package is private. After the first
# successful publish, open the package (repo → Packages) → Package settings →
# change visibility to Public so anyone can `docker pull` it.

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -race ./...

  image:
    needs: test
    # Publish only on pushes to the default branch or version tags — never PRs.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # main.version is stamped from this: the tag name for a release,
      # otherwise the short commit SHA. Logged at container startup.
      - name: Compute build version
        id: vars
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
