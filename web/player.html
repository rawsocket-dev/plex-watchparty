<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Now Playing · Late Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --ink:        #050403;
    --ink-2:      #0a0908;
    --paper:      #e8e2d4;
    --paper-mute: #8a8478;
    --rule:       #2a2620;
    --ember:      #d4a574;
    --ember-hi:   #f0c089;
    --serif: "Fraunces", "Times New Roman", Georgia, serif;
    --mono:  "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--ink); color: var(--paper);
    font-family: var(--serif);
  }
  #wrap { height: 100%; display: flex; flex-direction: column; }

  /* top bar — thin so the picture owns the screen */
  #bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 1rem;
    padding: .65rem clamp(.8rem, 2vw, 1.5rem);
    background: var(--ink-2);
    border-bottom: 1px solid var(--rule);
  }
  .left  { display: flex; align-items: center; gap: .9rem; justify-self: start; }
  .right { display: flex; align-items: center; gap: 1.2rem; justify-self: end; }

  .ctrl {
    background: transparent;
    border: 0;
    color: var(--paper);
    font-family: var(--serif);
    font-style: italic;
    font-size: 1rem;
    cursor: pointer;
    padding: .15rem 0;
    position: relative;
    line-height: 1;
  }
  .ctrl::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: -3px;
    height: 1px;
    background: var(--ember);
    transform: scaleX(0); transform-origin: left;
    transition: transform .25s cubic-bezier(.2,.7,.2,1);
  }
  .ctrl:hover { color: var(--ember-hi); }
  .ctrl:hover::after { transform: scaleX(1); }

  #title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 1rem;
    letter-spacing: .005em;
    color: var(--paper);
    text-align: center;
    font-variation-settings: "opsz" 72, "SOFT" 50;
    max-width: 60vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #title.idle { color: var(--paper-mute); }

  #sync, #bw {
    font-family: var(--mono);
    font-size: .6rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--paper-mute);
    display: flex;
    align-items: center;
    gap: .45rem;
  }
  #bw .you, #bw .room {
    color: var(--paper);
  }
  #bw .sep {
    color: var(--rule-hi, #3a342c);
    margin: 0 .15rem;
  }
  #sync::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--paper-mute);
    transition: background .3s ease, box-shadow .3s ease;
  }
  #sync.locked::before {
    background: var(--ember);
    box-shadow: 0 0 8px rgba(212,165,116,.6);
  }
  #sync.drifting::before {
    background: #c47d4a;
  }

  a.back {
    color: var(--paper-mute);
    text-decoration: none;
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    transition: color .2s ease;
  }
  a.back:hover { color: var(--ember-hi); }

  video {
    flex: 1;
    width: 100%;
    background: #000;
    min-height: 0;
    display: block;
  }

  /* always-visible scrub bar below the top bar — the native HTML5
     controls auto-hide and aren't obvious that you can drag-seek. */
  #scrub {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: .55rem clamp(.8rem, 2vw, 1.5rem);
    background: var(--ink-2);
    border-bottom: 1px solid var(--rule);
  }
  #scrub-track {
    flex: 1;
    height: 4px;
    background: var(--rule);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
    transition: height .15s ease;
  }
  #scrub-track:hover { height: 6px; }
  #scrub-buffered, #scrub-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    border-radius: 2px;
    pointer-events: none;
  }
  #scrub-buffered { background: var(--rule-hi, #3a342c); width: 0; }
  #scrub-fill     { background: var(--ember);            width: 0; }
  #scrub-thumb {
    position: absolute;
    left: 0; top: 50%;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--ember);
    transform: translate(-50%, -50%) scale(.85);
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s ease, transform .15s ease;
    box-shadow: 0 0 6px rgba(212, 165, 116, .35);
  }
  #scrub-track:hover #scrub-thumb { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #scrub-time {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .15em;
    color: var(--paper-mute);
    white-space: nowrap;
    min-width: 9em;
    text-align: right;
  }

  /* Stage area wraps the <video> so the join overlay can sit absolutely
     over it without escaping the player layout. */
  .stage {
    position: relative;
    flex: 1;
    min-height: 0;
    display: flex;
  }
  .stage video { flex: 1; }

  /* Browser autoplay policy blocks v.play() until a user gesture on the
     page. Without this overlay the video element just sits silently
     paused and viewers don't realise they need to click. */
  #join {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: rgba(5, 4, 3, .65);
    backdrop-filter: blur(4px);
    cursor: pointer;
    z-index: 50;
    transition: opacity .4s ease;
  }
  #join.hidden { opacity: 0; pointer-events: none; }
  #join .icon {
    width: 84px; height: 84px;
    border-radius: 50%;
    border: 1.5px solid var(--ember);
    display: flex; align-items: center; justify-content: center;
    color: var(--ember);
    transition: transform .25s ease, background .25s ease, box-shadow .25s ease;
  }
  #join .icon svg { width: 32px; height: 32px; margin-left: 4px; }
  #join:hover .icon {
    background: rgba(212, 165, 116, .12);
    transform: scale(1.05);
    box-shadow: 0 0 32px rgba(212, 165, 116, .25);
  }
  #join .label {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    letter-spacing: .005em;
    color: var(--paper);
    font-variation-settings: "opsz" 96, "SOFT" 60;
  }
  #join .hint {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--paper-mute);
  }

  /* unobtrusive perf strip — only renders after a load round-trip. */
  #perf {
    position: fixed;
    left: clamp(.8rem, 2vw, 1.5rem);
    top: 3.5rem;
    background: rgba(10,9,8,.85);
    backdrop-filter: blur(6px);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: .55rem 1.8rem .55rem .8rem;
    font-family: var(--mono);
    font-size: .62rem;
    letter-spacing: .12em;
    line-height: 1.7;
    color: var(--paper-mute);
    opacity: 0;
    transition: opacity .4s ease;
    z-index: 100;
    text-transform: uppercase;
    min-width: 14rem;
  }
  #perf.visible { opacity: 1; }
  #perf b {
    color: var(--ember);
    font-weight: 500;
  }
  #perf .row { display: flex; justify-content: space-between; gap: 1.2rem; }
  #perf .row span:last-child { color: var(--paper); }
  #perf .head {
    color: var(--paper-mute);
    border-bottom: 1px solid var(--rule);
    padding-bottom: .25rem;
    margin-bottom: .35rem;
    letter-spacing: .25em;
  }
  #perf .close {
    position: absolute;
    top: .3rem; right: .4rem;
    width: 1.2rem; height: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: 0;
    color: var(--paper-mute);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 1rem;
    line-height: 1;
    border-radius: 2px;
    transition: color .15s ease, background .15s ease;
    padding: 0;
  }
  #perf .close:hover { color: var(--ember); background: rgba(212,165,116,.08); }
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <div class="left">
      <button class="ctrl" id="play">Play</button>
      <button class="ctrl" id="pause">Pause</button>
    </div>
    <span id="title" class="idle">awaiting the host…</span>
    <div class="right">
      <span id="sync">idle</span>
      <span id="bw" hidden></span>
      <a class="back" href="/">← library</a>
    </div>
  </div>
  <div id="scrub" aria-label="Playback position">
    <div id="scrub-track">
      <div id="scrub-buffered"></div>
      <div id="scrub-fill"></div>
      <div id="scrub-thumb"></div>
    </div>
    <div id="scrub-time">0:00 / —</div>
  </div>
  <div class="stage">
    <video id="v" playsinline controls></video>
    <div id="join" role="button" tabindex="0" aria-label="Click to join the party">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="label">Take your seat.</div>
      <div class="hint">click anywhere to join</div>
    </div>
  </div>
</div>
<div id="perf" title="Click to dismiss"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script>
const v = document.getElementById('v');
const titleEl = document.getElementById('title');
const syncEl  = document.getElementById('sync');
const perfEl  = document.getElementById('perf');
const joinEl  = document.getElementById('join');
const bwEl    = document.getElementById('bw');
const scrubTrack    = document.getElementById('scrub-track');
const scrubFill     = document.getElementById('scrub-fill');
const scrubBuffered = document.getElementById('scrub-buffered');
const scrubThumb    = document.getElementById('scrub-thumb');
const scrubTime     = document.getElementById('scrub-time');

// --- scrub bar --------------------------------------------------------------
function fmtTime(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  s = Math.floor(s);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const mm = String(m).padStart(h > 0 ? 2 : 1, '0');
  const ss = String(sec).padStart(2, '0');
  return h > 0 ? h + ':' + mm + ':' + ss : mm + ':' + ss;
}
function updateScrub() {
  const dur = v.duration;
  const cur = v.currentTime || 0;
  if (isFinite(dur) && dur > 0) {
    const pct = Math.min(100, (cur / dur) * 100);
    scrubFill.style.width = pct + '%';
    scrubThumb.style.left = pct + '%';
    if (v.buffered.length > 0) {
      const buf = v.buffered.end(v.buffered.length - 1);
      scrubBuffered.style.width = Math.min(100, (buf / dur) * 100) + '%';
    }
    scrubTime.textContent = fmtTime(cur) + ' / ' + fmtTime(dur);
  } else {
    scrubFill.style.width = '0%';
    scrubBuffered.style.width = '0%';
    scrubTime.textContent = fmtTime(cur) + ' / —';
  }
}
v.addEventListener('timeupdate', updateScrub);
v.addEventListener('durationchange', updateScrub);
v.addEventListener('progress', updateScrub);
scrubTrack.addEventListener('click', (e) => {
  if (!isFinite(v.duration) || v.duration <= 0) return;
  const rect = scrubTrack.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  v.currentTime = pct * v.duration;
  // the `seeked` handler below broadcasts to everyone else.
});

// --- bandwidth poll ---------------------------------------------------------
async function pollBandwidth() {
  try {
    const r = await fetch('/api/bandwidth');
    if (!r.ok) return;
    const d = await r.json();
    if (d.mineKbps === 0 && d.totalKbps === 0) {
      bwEl.hidden = true;
      return;
    }
    bwEl.hidden = false;
    bwEl.innerHTML =
      '<span>you</span> <span class="you">' + fmtRate(d.mineKbps) + '</span>' +
      '<span class="sep">·</span>' +
      '<span>room</span> <span class="room">' + fmtRate(d.totalKbps) + '</span>' +
      '<span class="sep">·</span>' +
      '<span>' + d.viewers + ' viewer' + (d.viewers === 1 ? '' : 's') + '</span>';
  } catch (_) { /* network blip — try again next tick */ }
}
function fmtRate(kbps) {
  if (kbps >= 1000) return (kbps / 1000).toFixed(1) + ' Mbps';
  return kbps + ' kbps';
}
setInterval(pollBandwidth, 2000);
pollBandwidth();

// Browser autoplay policy: v.play() is rejected until the user has
// interacted with the page. We satisfy that with a visible overlay
// the viewer clicks once. After that, all subsequent /events-driven
// play/pause calls work normally.
let userJoined = false;
function dismissJoin() {
  userJoined = true;
  joinEl.classList.add('hidden');
}
joinEl.addEventListener('click', () => {
  // Try to play immediately — this click is the user gesture, so the
  // browser allows it even with sound.
  v.play().catch(() => { /* state may not be ready yet; will retry from SSE */ });
  dismissJoin();
});
joinEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); joinEl.click(); }
});
v.addEventListener('playing', () => dismissJoin());
let loadedKey = null;     // ratingKey currently attached to the <video>
let applying = false;     // suppress echo while we apply server state
const DRIFT = 0.75;       // seconds of tolerable drift before a hard seek

// --- timing instrumentation -------------------------------------------------
// index.html stashes the click→/control round-trip + server phase numbers
// in sessionStorage before navigating here. We capture nav-arrival + TTFF
// and render a single breakdown.
const lastLoad = (() => {
  try { return JSON.parse(sessionStorage.getItem('lastLoad') || 'null'); }
  catch { return null; }
})();
const pageArrivedAt = performance.now();
let firstFrameLogged = false;
let ttffMs = null;
function renderPerf() {
  if (!lastLoad) return;
  const s = lastLoad.server || {};
  const navMs = lastLoad.navAt ? Math.max(0, Date.now() - lastLoad.navAt) : null;
  const rows = [
    ['title',           lastLoad.title || '—'],
    ['plex resolve',    fmt(s.plexResolveMs)],
    ['plex list',       fmt(s.plexListMs)],
    ['ffmpeg → playlist', fmt(s.remuxStartMs)],
    ['server total',    fmt(s.totalMs)],
    ['click → control', fmt(lastLoad.clickToControlMs)],
    ['nav → /watch',    navMs == null ? '—' : fmt(navMs)],
    ['<b>ttff</b>',     '<b>' + (ttffMs == null ? 'waiting…' : fmt(ttffMs)) + '</b>'],
  ];
  perfEl.innerHTML =
    '<button class="close" type="button" aria-label="hide timings">×</button>' +
    '<div class="head">load timings</div>' +
    rows.map(([k, val]) =>
      '<div class="row"><span>' + k + '</span><span>' + val + '</span></div>'
    ).join('');
  perfEl.classList.add('visible');
  // Re-bind the close button each render (the innerHTML rewrite replaces it).
  perfEl.querySelector('.close').addEventListener('click', (e) => {
    e.stopPropagation();
    perfEl.classList.remove('visible');
  });
}
// Show server-side numbers immediately. TTFF row fills in when the
// video's first frame paints — or stays at "waiting…" if it never does,
// which is itself a useful signal.
renderPerf();
function fmt(ms) {
  if (ms == null || isNaN(ms)) return '—';
  if (ms < 1000) return ms + ' ms';
  return (ms / 1000).toFixed(2) + ' s';
}

function setStatus(text, kind) {
  syncEl.textContent = text;
  syncEl.classList.remove('locked', 'drifting');
  if (kind === 'locked') syncEl.classList.add('locked');
  if (kind === 'drifting') syncEl.classList.add('drifting');
}

function attach() {
  const src = '/hls/index.m3u8?ts=' + Date.now();

  // Quick capability probe — surface HEVC support up front so a Linux/Firefox
  // user sees a useful message instead of an empty player.
  const hevcMaybe = MediaSource.isTypeSupported
    && MediaSource.isTypeSupported('video/mp4; codecs="hvc1.2.4.L150.B0"');
  console.log('player: native HLS =', v.canPlayType('application/vnd.apple.mpegurl'),
              ' MSE HEVC =', hevcMaybe);

  if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = src;                       // Safari: native HLS (incl. HEVC)
    return;
  }
  if (window.Hls && Hls.isSupported()) {
    const hls = new Hls();
    hls.on(Hls.Events.ERROR, (_, data) => {
      console.error('hls.js error', data);
      if (data.fatal) {
        const codecHint = !hevcMaybe
          ? '  (this browser lacks HEVC support — try Safari, or Chrome on macOS / Windows w/ HEVC extension)'
          : '';
        setStatus('player error: ' + (data.details || data.type) + codecHint);
      }
    });
    hls.loadSource(src);
    hls.attachMedia(v);
    return;
  }
  v.src = src;
}

v.addEventListener('error', () => {
  const err = v.error;
  console.error('video element error', err);
  if (err) setStatus('video error: ' + err.code + ' ' + (err.message || ''));
});

// First frame painted = end of TTFF. `playing` fires after the decoder
// has output its first frame (more accurate than `loadeddata`).
v.addEventListener('playing', () => {
  if (firstFrameLogged) return;
  firstFrameLogged = true;
  ttffMs = Math.round(performance.now() - pageArrivedAt);
  console.log('player TTFF (page-arrival → first frame):', ttffMs, 'ms');
  renderPerf();
});

function post(action, extra) {
  fetch('/control', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({action}, extra||{}))
  });
}

// --- apply authoritative server state ---------------------------------------
const es = new EventSource('/events');
es.onmessage = (e) => {
  const s = JSON.parse(e.data);
  if (!s.ratingKey) {
    titleEl.textContent = 'awaiting the host…';
    titleEl.classList.add('idle');
    syncEl.textContent = 'idle';
    syncEl.classList.remove('locked', 'drifting');
    return;
  }
  titleEl.textContent = s.title;
  titleEl.classList.remove('idle');

  if (s.ratingKey !== loadedKey) { loadedKey = s.ratingKey; attach(); }

  // Where should we be right now?
  let target = s.positionSec;
  if (s.playing) target += (Date.now() - s.updatedAtMs) / 1000;

  applying = true;
  if (Math.abs(v.currentTime - target) > DRIFT && isFinite(target)) {
    v.currentTime = target;
  }
  if (s.playing && v.paused) v.play().catch(()=>{});
  if (!s.playing && !v.paused) v.pause();
  setTimeout(() => { applying = false; }, 250);

  const drift = v.currentTime - target;
  syncEl.textContent = 'drift ' + drift.toFixed(2) + 's';
  syncEl.classList.toggle('drifting', Math.abs(drift) > DRIFT / 2);
  syncEl.classList.toggle('locked',   Math.abs(drift) <= DRIFT / 2);
};

// --- local controls broadcast to everyone -----------------------------------
document.getElementById('play').onclick  = () => post('play');
document.getElementById('pause').onclick = () => post('pause');
v.addEventListener('seeked', () => {
  if (!applying) post('seek', {positionSec: v.currentTime});
});
v.addEventListener('play',  () => { if (!applying) post('play');  });
v.addEventListener('pause', () => { if (!applying) post('pause'); });
</script>
</body>
</html>
