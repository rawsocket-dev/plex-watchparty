<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Now Playing · Late Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/player.css">
</head>
<body>
<div id="wrap">
  <div id="bar">
    <div class="cell-group">
      <div class="cell role-cell">
        <div class="lbl">Op_001 · Role</div>
        <div class="v">
          <span class="r-host">Host</span><span class="r-viewer">Viewer</span>
        </div>
      </div>
      <div class="cell sync-cell">
        <div class="lbl">Sync</div>
        <div class="v" id="sync">listening</div>
      </div>
      <div class="cell bw-cell" id="bw" hidden>
        <div class="lbl">Bw_out · L01</div>
        <div class="v"></div>
      </div>
      <div class="cell viewers-cell" id="viewers" hidden>
        <div class="lbl">Ch_audience</div>
        <div class="v"><span class="count"></span></div>
        <div class="roster" role="tooltip"></div>
      </div>
    </div>
    <div class="cell title-cell">
      <div class="lbl">Feed_Live · Source 01</div>
      <div class="v idle" id="title">awaiting the host…</div>
    </div>
    <div class="cell-group">
      <button class="cell-btn primary" id="play"><span class="led"></span>Run</button>
      <button class="cell-btn" id="pause"><span class="led"></span>Pause</button>
      <div class="cell-btn vol-cell" id="volume" tabindex="0" title="Volume (click to mute, scroll to adjust)">
        <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path class="vol-base" d="M3 9v6h4l5 4V5L7 9H3z"/>
          <path class="vol-mid"  d="M14 8.5v7c1.2-.8 2-2.1 2-3.5s-.8-2.7-2-3.5z"/>
          <path class="vol-hi"   d="M14 5v2c2.3.9 4 3.2 4 5.9s-1.7 5-4 5.9v2c3.4-1 6-4.1 6-7.9S17.4 6 14 5z"/>
          <path class="vol-x"    d="M16.5 12l2.8-2.8-1.4-1.4L15 10.6l-2.8-2.8-1.4 1.4L13.6 12l-2.8 2.8 1.4 1.4L15 13.4l2.8 2.8 1.4-1.4L16.5 12z"/>
        </svg>
        <div class="vol-popover" role="group" aria-label="Volume">
          <input type="range" id="vol-slider" min="0" max="100" step="1" value="100" aria-label="Volume level">
          <div class="vol-value"><span id="vol-readout">100</span><span class="vol-unit">%</span></div>
        </div>
      </div>
      <button class="cell-btn" id="zoom" title="Zoom (fit / fill)"><span class="led"></span>Fit</button>
      <button class="cell-btn" id="fullscreen" title="Fullscreen"><span class="led"></span>FS</button>
      <a class="cell-btn warn" id="library-link" href="/"><span class="led"></span>Out</a>
    </div>
  </div>
  <div id="scrub" aria-label="Playback position">
    <div id="scrub-hit">
      <div id="scrub-track">
        <div id="scrub-seekable"></div>
        <div id="scrub-buffered"></div>
        <div id="scrub-fill"></div>
      </div>
      <div id="scrub-thumb"></div>
      <div id="scrub-tooltip">0:00</div>
    </div>
    <div id="scrub-time">0:00 / —</div>
  </div>
  <div class="stage">
    <video id="v" playsinline disablepictureinpicture></video>
    <div id="join" role="button" tabindex="0" aria-label="Click to join the party">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="label">Take your seat.</div>
      <div class="hint">click anywhere to join</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script src="/static/common.js"></script>
<script src="/static/player.js"></script>
</body>
</html>
