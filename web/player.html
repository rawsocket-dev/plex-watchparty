<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Now Playing · Late Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --ink:        #050403;
    --ink-2:      #0a0908;
    --paper:      #e8e2d4;
    --paper-mute: #8a8478;
    --rule:       #2a2620;
    --ember:      #d4a574;
    --ember-hi:   #f0c089;
    --serif: "Fraunces", "Times New Roman", Georgia, serif;
    --mono:  "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--ink); color: var(--paper);
    font-family: var(--serif);
  }
  #wrap { height: 100%; display: flex; flex-direction: column; }

  /* top bar — thin so the picture owns the screen */
  #bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 1rem;
    padding: .65rem clamp(.8rem, 2vw, 1.5rem);
    background: var(--ink-2);
    border-bottom: 1px solid var(--rule);
  }
  .left  { display: flex; align-items: center; gap: .9rem; justify-self: start; }
  .right { display: flex; align-items: center; gap: 1.2rem; justify-self: end; }

  .ctrl {
    background: transparent;
    border: 0;
    color: var(--paper);
    font-family: var(--serif);
    font-style: italic;
    font-size: 1rem;
    cursor: pointer;
    padding: .15rem 0;
    position: relative;
    line-height: 1;
  }
  .ctrl::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: -3px;
    height: 1px;
    background: var(--ember);
    transform: scaleX(0); transform-origin: left;
    transition: transform .25s cubic-bezier(.2,.7,.2,1);
  }
  .ctrl:hover { color: var(--ember-hi); }
  .ctrl:hover::after { transform: scaleX(1); }

  #title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 1rem;
    letter-spacing: .005em;
    color: var(--paper);
    text-align: center;
    font-variation-settings: "opsz" 72, "SOFT" 50;
    max-width: 60vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #title.idle { color: var(--paper-mute); }

  #sync {
    font-family: var(--mono);
    font-size: .6rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--paper-mute);
    display: flex;
    align-items: center;
    gap: .45rem;
  }
  #sync::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--paper-mute);
    transition: background .3s ease, box-shadow .3s ease;
  }
  #sync.locked::before {
    background: var(--ember);
    box-shadow: 0 0 8px rgba(212,165,116,.6);
  }
  #sync.drifting::before {
    background: #c47d4a;
  }

  a.back {
    color: var(--paper-mute);
    text-decoration: none;
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    transition: color .2s ease;
  }
  a.back:hover { color: var(--ember-hi); }

  video {
    flex: 1;
    width: 100%;
    background: #000;
    min-height: 0;
    display: block;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <div class="left">
      <button class="ctrl" id="play">Play</button>
      <button class="ctrl" id="pause">Pause</button>
    </div>
    <span id="title" class="idle">awaiting the host…</span>
    <div class="right">
      <span id="sync">idle</span>
      <a class="back" href="/">← library</a>
    </div>
  </div>
  <video id="v" playsinline controls></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script>
const v = document.getElementById('v');
const titleEl = document.getElementById('title');
const syncEl  = document.getElementById('sync');
let loadedKey = null;     // ratingKey currently attached to the <video>
let applying = false;     // suppress echo while we apply server state
const DRIFT = 0.75;       // seconds of tolerable drift before a hard seek

function setStatus(text, kind) {
  syncEl.textContent = text;
  syncEl.classList.remove('locked', 'drifting');
  if (kind === 'locked') syncEl.classList.add('locked');
  if (kind === 'drifting') syncEl.classList.add('drifting');
}

function attach() {
  const src = '/hls/index.m3u8?ts=' + Date.now();

  // Quick capability probe — surface HEVC support up front so a Linux/Firefox
  // user sees a useful message instead of an empty player.
  const hevcMaybe = MediaSource.isTypeSupported
    && MediaSource.isTypeSupported('video/mp4; codecs="hvc1.2.4.L150.B0"');
  console.log('player: native HLS =', v.canPlayType('application/vnd.apple.mpegurl'),
              ' MSE HEVC =', hevcMaybe);

  if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = src;                       // Safari: native HLS (incl. HEVC)
    return;
  }
  if (window.Hls && Hls.isSupported()) {
    const hls = new Hls();
    hls.on(Hls.Events.ERROR, (_, data) => {
      console.error('hls.js error', data);
      if (data.fatal) {
        const codecHint = !hevcMaybe
          ? '  (this browser lacks HEVC support — try Safari, or Chrome on macOS / Windows w/ HEVC extension)'
          : '';
        setStatus('player error: ' + (data.details || data.type) + codecHint);
      }
    });
    hls.loadSource(src);
    hls.attachMedia(v);
    return;
  }
  v.src = src;
}

v.addEventListener('error', () => {
  const err = v.error;
  console.error('video element error', err);
  if (err) setStatus('video error: ' + err.code + ' ' + (err.message || ''));
});

function post(action, extra) {
  fetch('/control', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({action}, extra||{}))
  });
}

// --- apply authoritative server state ---------------------------------------
const es = new EventSource('/events');
es.onmessage = (e) => {
  const s = JSON.parse(e.data);
  if (!s.ratingKey) {
    titleEl.textContent = 'awaiting the host…';
    titleEl.classList.add('idle');
    syncEl.textContent = 'idle';
    syncEl.classList.remove('locked', 'drifting');
    return;
  }
  titleEl.textContent = s.title;
  titleEl.classList.remove('idle');

  if (s.ratingKey !== loadedKey) { loadedKey = s.ratingKey; attach(); }

  // Where should we be right now?
  let target = s.positionSec;
  if (s.playing) target += (Date.now() - s.updatedAtMs) / 1000;

  applying = true;
  if (Math.abs(v.currentTime - target) > DRIFT && isFinite(target)) {
    v.currentTime = target;
  }
  if (s.playing && v.paused) v.play().catch(()=>{});
  if (!s.playing && !v.paused) v.pause();
  setTimeout(() => { applying = false; }, 250);

  const drift = v.currentTime - target;
  syncEl.textContent = 'drift ' + drift.toFixed(2) + 's';
  syncEl.classList.toggle('drifting', Math.abs(drift) > DRIFT / 2);
  syncEl.classList.toggle('locked',   Math.abs(drift) <= DRIFT / 2);
};

// --- local controls broadcast to everyone -----------------------------------
document.getElementById('play').onclick  = () => post('play');
document.getElementById('pause').onclick = () => post('pause');
v.addEventListener('seeked', () => {
  if (!applying) post('seek', {positionSec: v.currentTime});
});
v.addEventListener('play',  () => { if (!applying) post('play');  });
v.addEventListener('pause', () => { if (!applying) post('pause'); });
</script>
</body>
</html>
