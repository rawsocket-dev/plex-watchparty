<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Now Playing · Late Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --ink:        #050403;
    --ink-2:      #0a0908;
    --paper:      #e8e2d4;
    --paper-mute: #8a8478;
    --rule:       #2a2620;
    --ember:      #d4a574;
    --ember-hi:   #f0c089;
    --serif: "Fraunces", "Times New Roman", Georgia, serif;
    --mono:  "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--ink); color: var(--paper);
    font-family: var(--serif);
  }
  #wrap { height: 100%; display: flex; flex-direction: column; }

  /* top bar — thin so the picture owns the screen */
  #bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 1rem;
    padding: .65rem clamp(.8rem, 2vw, 1.5rem);
    background: var(--ink-2);
    border-bottom: 1px solid var(--rule);
  }
  .left  { display: flex; align-items: center; gap: .9rem; justify-self: start; }
  .right { display: flex; align-items: center; gap: 1.2rem; justify-self: end; }

  .ctrl {
    background: transparent;
    border: 0;
    color: var(--paper);
    font-family: var(--serif);
    font-style: italic;
    font-size: 1rem;
    cursor: pointer;
    padding: .15rem 0;
    position: relative;
    line-height: 1;
  }
  .ctrl::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: -3px;
    height: 1px;
    background: var(--ember);
    transform: scaleX(0); transform-origin: left;
    transition: transform .25s cubic-bezier(.2,.7,.2,1);
  }
  .ctrl:hover { color: var(--ember-hi); }
  .ctrl:hover::after { transform: scaleX(1); }

  #title {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 1rem;
    letter-spacing: .005em;
    color: var(--paper);
    text-align: center;
    font-variation-settings: "opsz" 72, "SOFT" 50;
    max-width: 60vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #title.idle { color: var(--paper-mute); }

  #sync, #bw {
    font-family: var(--mono);
    font-size: .6rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--paper-mute);
    display: flex;
    align-items: center;
    gap: .45rem;
  }
  /* Fixed footprint so the centered title doesn't bounce when the
     drift number / bandwidth values change width. Both ends of the
     top bar use tabular-nums + a min-width that comfortably fits the
     widest expected value. */
  #sync {
    min-width: 12ch;
    font-variant-numeric: tabular-nums;
    justify-content: flex-start;
  }
  #bw {
    font-variant-numeric: tabular-nums;
  }
  #bw .you, #bw .room {
    color: var(--paper);
  }
  #bw .sep {
    color: var(--rule-hi, #3a342c);
    margin: 0 .15rem;
  }
  #sync::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--paper-mute);
    transition: background .3s ease, box-shadow .3s ease;
  }
  #sync.locked::before {
    background: var(--ember);
    box-shadow: 0 0 8px rgba(212,165,116,.6);
  }
  #sync.drifting::before {
    background: #c47d4a;
  }

  a.back {
    color: var(--paper-mute);
    text-decoration: none;
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    transition: color .2s ease;
  }
  a.back:hover { color: var(--ember-hi); }

  /* Viewer mode — controls hidden, scrub bar visually disabled. */
  body.viewer .ctrl { display: none; }
  body.viewer #scrub-hit { cursor: default; }
  body.viewer #scrub-hit:hover #scrub-track { height: 4px; }
  body.viewer #scrub-thumb { opacity: .65; }
  body.viewer #scrub-hit:hover #scrub-thumb,
  body.viewer #scrub-hit.dragging #scrub-thumb { transform: translateY(-50%); }
  body.viewer #scrub-tooltip { display: none; }
  #viewer-tag {
    font-family: var(--mono);
    font-size: .6rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--ember);
    display: none;
  }
  body.viewer #viewer-tag { display: inline; }

  video {
    flex: 1;
    width: 100%;
    background: #000;
    min-height: 0;
    display: block;
  }

  /* Scrub bar — always visible, generous hit target, drag-to-seek.
     The visible track is a thin line, but the entire row height is
     clickable so it's easy to grab. Thumb stays visible whenever a
     duration is known. */
  #scrub {
    display: flex;
    align-items: stretch;
    gap: 1rem;
    padding: 0 clamp(.8rem, 2vw, 1.5rem);
    background: var(--ink-2);
    border-bottom: 1px solid var(--rule);
    min-height: 2.6rem;
  }
  #scrub-hit {
    flex: 1;
    position: relative;
    cursor: pointer;
    display: flex;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #scrub-hit.dragging { cursor: grabbing; }
  #scrub-track {
    position: relative;
    width: 100%;
    height: 4px;
    background: var(--rule);
    border-radius: 2px;
    transition: height .15s ease;
  }
  #scrub-hit:hover #scrub-track,
  #scrub-hit.dragging #scrub-track { height: 8px; }
  #scrub-seekable, #scrub-buffered, #scrub-fill {
    position: absolute;
    left: 0; top: 0;
    height: 100%;
    border-radius: 2px;
    pointer-events: none;
  }
  /* Stack: track (background, can't seek here) < seekable (can seek)
     < buffered (already loaded) < fill (played). Layered colors are
     subtle on purpose; the visible "available to scrub" cue is just
     a slightly lighter band. */
  #scrub-seekable { background: var(--rule-hi, #3a342c); width: 0; opacity: .55; }
  #scrub-buffered { background: var(--rule-hi, #3a342c); width: 0; }
  #scrub-fill     { background: var(--ember);            width: 0; }
  #scrub-thumb {
    position: absolute;
    left: 0;
    top: 50%;
    width: 14px; height: 14px;
    margin-left: -7px;
    border-radius: 50%;
    background: var(--ember);
    pointer-events: none;
    transform: translateY(-50%);
    transition: transform .12s ease, box-shadow .12s ease, opacity .15s ease;
    box-shadow: 0 0 8px rgba(212, 165, 116, .45);
    opacity: 0;
  }
  #scrub-hit.ready #scrub-thumb { opacity: 1; }
  #scrub-hit:hover #scrub-thumb,
  #scrub-hit.dragging #scrub-thumb {
    transform: translateY(-50%) scale(1.25);
    box-shadow: 0 0 14px rgba(212, 165, 116, .65);
  }
  #scrub-tooltip {
    position: absolute;
    bottom: calc(100% - .5rem);
    transform: translateX(-50%);
    background: var(--ink);
    border: 1px solid var(--rule);
    padding: .25rem .55rem;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: .68rem;
    letter-spacing: .08em;
    color: var(--paper);
    pointer-events: none;
    white-space: nowrap;
    opacity: 0;
    transition: opacity .12s ease;
    z-index: 60;
  }
  #scrub-hit:hover #scrub-tooltip,
  #scrub-hit.dragging #scrub-tooltip { opacity: 1; }
  #scrub-time {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .15em;
    color: var(--paper-mute);
    white-space: nowrap;
    min-width: 9em;
    text-align: right;
    align-self: center;
  }

  /* Stage area wraps the <video> so the join overlay can sit absolutely
     over it without escaping the player layout. */
  .stage {
    position: relative;
    flex: 1;
    min-height: 0;
    display: flex;
  }
  .stage video { flex: 1; }

  /* Browser autoplay policy blocks v.play() until a user gesture on the
     page. Without this overlay the video element just sits silently
     paused and viewers don't realise they need to click. The overlay
     also doubles as a buffer-fill progress indicator at startup so
     viewers see the transcoder + buffer accumulating instead of
     wondering why the play icon isn't responsive. */
  #join {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: rgba(5, 4, 3, .65);
    backdrop-filter: blur(4px);
    cursor: default;
    z-index: 50;
    transition: opacity .4s ease;
  }
  #join.hidden { opacity: 0; pointer-events: none; }
  #join.ready { cursor: pointer; }

  /* SVG progress ring behind the play icon. stroke-dashoffset is the
     bulletproof way to do an animated progress arc — works the same in
     every browser, transitions smoothly via plain CSS, and doesn't need
     @property or conic-gradient gymnastics. */
  #join .icon-wrap {
    position: relative;
    width: 96px; height: 96px;
    display: flex; align-items: center; justify-content: center;
  }
  #join .ring {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg); /* start at 12 o'clock */
  }
  #join .ring .track {
    fill: none;
    stroke: rgba(212, 165, 116, 0.15);
    stroke-width: 3;
  }
  #join .ring .fill {
    fill: none;
    stroke: var(--ember);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset .25s linear;
  }
  #join .icon {
    width: 84px; height: 84px;
    border-radius: 50%;
    border: 1.5px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    color: var(--paper-mute);
    transition: transform .25s ease, background .25s ease,
                box-shadow .25s ease, border-color .25s ease, color .25s ease;
  }
  #join .icon svg { width: 32px; height: 32px; margin-left: 4px; }
  #join.ready .icon {
    border-color: var(--ember);
    color: var(--ember);
  }
  #join.ready:hover .icon {
    background: rgba(212, 165, 116, .12);
    transform: scale(1.05);
    box-shadow: 0 0 32px rgba(212, 165, 116, .25);
  }
  #join .label {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    letter-spacing: .005em;
    color: var(--paper);
    font-variation-settings: "opsz" 96, "SOFT" 60;
  }
  #join .hint {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--paper-mute);
    font-variant-numeric: tabular-nums;
  }
  #join.ready .hint { color: var(--ember); }

</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <div class="left">
      <button class="ctrl" id="play">Play</button>
      <button class="ctrl" id="pause">Pause</button>
      <span id="viewer-tag">guest</span>
    </div>
    <span id="title" class="idle">awaiting the host…</span>
    <div class="right">
      <span id="sync">idle</span>
      <span id="bw" hidden></span>
      <a class="back" href="/">← library</a>
    </div>
  </div>
  <div id="scrub" aria-label="Playback position">
    <div id="scrub-hit">
      <div id="scrub-track">
        <div id="scrub-seekable"></div>
        <div id="scrub-buffered"></div>
        <div id="scrub-fill"></div>
      </div>
      <div id="scrub-thumb"></div>
      <div id="scrub-tooltip">0:00</div>
    </div>
    <div id="scrub-time">0:00 / —</div>
  </div>
  <div class="stage">
    <video id="v" playsinline disablepictureinpicture></video>
    <div id="join" role="button" tabindex="0" aria-label="Click to join the party">
      <div class="icon-wrap">
        <svg class="ring" viewBox="0 0 96 96" aria-hidden="true">
          <circle class="track" cx="48" cy="48" r="46"></circle>
          <circle class="fill"  cx="48" cy="48" r="46"
                  stroke-dasharray="289.027" stroke-dashoffset="289.027"></circle>
        </svg>
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="label">Warming the projector…</div>
      <div class="hint">preparing your show</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script>
const v = document.getElementById('v');
const titleEl = document.getElementById('title');
const syncEl  = document.getElementById('sync');
const joinEl  = document.getElementById('join');
const bwEl    = document.getElementById('bw');

// Default to host until /api/whoami answers. Viewers can't seek or
// drive playback; their scrub-bar interactions silently no-op and
// their buttons are hidden via the .viewer body class.
let isHost = true;
fetch('/api/whoami').then(r => r.ok ? r.json() : null).then(d => {
  if (!d) return;
  isHost = d.role === 'host';
  if (!isHost) document.body.classList.add('viewer');
}).catch(() => {});
const scrubHit      = document.getElementById('scrub-hit');
const scrubTrack    = document.getElementById('scrub-track');
const scrubFill     = document.getElementById('scrub-fill');
const scrubBuffered = document.getElementById('scrub-buffered');
const scrubSeekable = document.getElementById('scrub-seekable');
const scrubThumb    = document.getElementById('scrub-thumb');
const scrubTooltip  = document.getElementById('scrub-tooltip');
const scrubTime     = document.getElementById('scrub-time');

// --- scrub bar --------------------------------------------------------------
function fmtTime(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  s = Math.floor(s);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const mm = String(m).padStart(h > 0 ? 2 : 1, '0');
  const ss = String(sec).padStart(2, '0');
  return h > 0 ? h + ':' + mm + ':' + ss : mm + ':' + ss;
}
// Server pushes the movie duration via SSE state (sourced from Plex
// metadata at load time — authoritative). We prefer it over v.duration
// because with our incrementally-loaded VOD playlist v.duration only
// reflects the fragments hls.js has seen so far, NOT the actual movie
// length. Using v.duration would shrink the scrub bar to "buffered so
// far" instead of "the whole movie".
let serverDuration = 0;
function knownDuration() {
  if (serverDuration > 0) return serverDuration;
  if (isFinite(v.duration) && v.duration > 0) return v.duration;
  return 0;
}
let scrubDragging = false;
let scrubPendingPct = null;
function pctFromEvent(e) {
  const rect = scrubHit.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX);
  const x = cx - rect.left;
  return Math.max(0, Math.min(1, x / rect.width));
}
function rawPctFromEvent(e) {
  // Unclamped, for diagnostic logging only.
  const rect = scrubHit.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX);
  return ((cx - rect.left) / rect.width);
}
function paintAt(pct) {
  scrubFill.style.width  = (pct * 100) + '%';
  scrubThumb.style.left  = (pct * 100) + '%';
  const dur = knownDuration();
  if (dur > 0) {
    scrubTooltip.textContent = fmtTime(pct * dur);
    scrubTooltip.style.left  = (pct * 100) + '%';
  }
}
function updateScrub() {
  const dur = knownDuration();
  const cur = v.currentTime || 0;
  if (dur > 0) {
    scrubHit.classList.add('ready');
    if (!scrubDragging) paintAt(cur / dur);
    if (v.buffered.length > 0) {
      const buf = v.buffered.end(v.buffered.length - 1);
      scrubBuffered.style.width = Math.min(100, (buf / dur) * 100) + '%';
    }
    // Seekable range — for live/event playlists this lags behind the
    // total movie duration; the lighter band shows the user the
    // portion of the bar they can actually scrub into.
    if (v.seekable.length > 0) {
      const sk = v.seekable.end(v.seekable.length - 1);
      scrubSeekable.style.width = Math.min(100, (sk / dur) * 100) + '%';
    } else {
      scrubSeekable.style.width = '0%';
    }
    scrubTime.textContent = fmtTime(cur) + ' / ' + fmtTime(dur);
  } else {
    scrubHit.classList.remove('ready');
    scrubFill.style.width = '0%';
    scrubBuffered.style.width = '0%';
    scrubSeekable.style.width = '0%';
    scrubTime.textContent = fmtTime(cur) + ' / —';
  }
}
v.addEventListener('timeupdate', updateScrub);
v.addEventListener('durationchange', updateScrub);
v.addEventListener('progress', updateScrub);

// Hover: keep the tooltip following the cursor with the target time.
scrubHit.addEventListener('mousemove', (e) => {
  if (knownDuration() <= 0) return;
  const pct = pctFromEvent(e);
  if (scrubDragging) { paintAt(pct); scrubPendingPct = pct; }
  else {
    scrubTooltip.textContent = fmtTime(pct * knownDuration());
    scrubTooltip.style.left  = (pct * 100) + '%';
  }
});
// Mouse drag — listeners live on window so the cursor can leave the
// track mid-drag and still get the seek when released.
scrubHit.addEventListener('mousedown', (e) => {
  if (!isHost) return;
  if (knownDuration() <= 0) return;
  e.preventDefault();
  scrubDragging = true;
  scrubHit.classList.add('dragging');
  const pct = pctFromEvent(e);
  const raw = rawPctFromEvent(e);
  console.log('scrub mousedown: pct=', pct.toFixed(3),
              ' raw=', raw.toFixed(3),
              ' clientX=', e.clientX,
              ' rect=', scrubHit.getBoundingClientRect().left.toFixed(0) + '..' +
                        (scrubHit.getBoundingClientRect().left + scrubHit.getBoundingClientRect().width).toFixed(0));
  paintAt(pct);
  scrubPendingPct = pct;
});
window.addEventListener('mousemove', (e) => {
  if (!scrubDragging || knownDuration() <= 0) return;
  const pct = pctFromEvent(e);
  paintAt(pct);
  scrubPendingPct = pct;
});
window.addEventListener('mouseup', () => {
  if (!scrubDragging) return;
  scrubDragging = false;
  scrubHit.classList.remove('dragging');
  commitScrubSeek();
});
// Touch
scrubHit.addEventListener('touchstart', (e) => {
  if (!isHost) return;
  if (knownDuration() <= 0) return;
  e.preventDefault();
  scrubDragging = true;
  scrubHit.classList.add('dragging');
  const pct = pctFromEvent(e);
  paintAt(pct);
  scrubPendingPct = pct;
}, { passive: false });
scrubHit.addEventListener('touchmove', (e) => {
  if (!scrubDragging || knownDuration() <= 0) return;
  e.preventDefault();
  const pct = pctFromEvent(e);
  paintAt(pct);
  scrubPendingPct = pct;
}, { passive: false });
scrubHit.addEventListener('touchend', () => {
  if (!scrubDragging) return;
  scrubDragging = false;
  scrubHit.classList.remove('dragging');
  commitScrubSeek();
});

// Wall-clock time (ms) of our last local play/pause/seek so we can
// ignore SSE state broadcasts that pre-date it. Without this, an SSE
// message that was in-flight when the user dragged the scrub bar can
// arrive a moment later carrying the OLD position and yank the player
// back. 500 ms tolerance for client↔server clock skew.
let lastLocalActionMs = 0;
function commitScrubSeek() {
  const dur = knownDuration();
  if (scrubPendingPct == null || dur <= 0) {
    console.log('scrub commit skipped: pct=', scrubPendingPct, ' dur=', dur);
    scrubPendingPct = null;
    return;
  }
  let target = scrubPendingPct * dur;
  scrubPendingPct = null;
  // Clamp to the currently-seekable range. ffmpeg is producing
  // segments incrementally; trying to seek past the buffered end
  // throws hls.js into an error loop because there's no fragment to
  // load yet. Clamp 0.5s in from each edge so we don't land exactly
  // on the boundary (which Chrome can interpret as out-of-range).
  let clampedTo = null;
  if (v.seekable.length > 0) {
    const lo = v.seekable.start(0) + 0.5;
    const hi = v.seekable.end(v.seekable.length - 1) - 0.5;
    if (target < lo) { clampedTo = 'start'; target = lo; }
    else if (target > hi) { clampedTo = 'end (waiting on more fragments)'; target = hi; }
  }
  const seekableRanges = [];
  for (let i = 0; i < v.seekable.length; i++) {
    seekableRanges.push(v.seekable.start(i).toFixed(1) + '..' + v.seekable.end(i).toFixed(1));
  }
  console.log('scrub commit:',
              ' target=', target.toFixed(2), 's',
              ' dur=', dur.toFixed(0),
              ' clamped=', clampedTo,
              ' v.currentTime(before)=', v.currentTime.toFixed(2),
              ' v.duration=', v.duration,
              ' v.seekable=[', seekableRanges.join(', '), ']');
  lastLocalActionMs = Date.now();
  v.currentTime = target;
  console.log('   v.currentTime(after assign)=', v.currentTime.toFixed(2));
  post('seek', { positionSec: target });
}

// --- bandwidth poll ---------------------------------------------------------
async function pollBandwidth() {
  try {
    const r = await fetch('/api/bandwidth');
    if (!r.ok) return;
    const d = await r.json();
    if (d.mineKbps === 0 && d.totalKbps === 0) {
      bwEl.hidden = true;
      return;
    }
    bwEl.hidden = false;
    bwEl.innerHTML =
      '<span>you</span> <span class="you">' + fmtRate(d.mineKbps) + '</span>' +
      '<span class="sep">·</span>' +
      '<span>room</span> <span class="room">' + fmtRate(d.totalKbps) + '</span>' +
      '<span class="sep">·</span>' +
      '<span>' + d.viewers + ' viewer' + (d.viewers === 1 ? '' : 's') + '</span>';
  } catch (_) { /* network blip — try again next tick */ }
}
function fmtRate(kbps) {
  if (kbps >= 1000) return (kbps / 1000).toFixed(1) + ' Mbps';
  return kbps + ' kbps';
}
setInterval(pollBandwidth, 2000);
pollBandwidth();

// Browser autoplay policy: v.play() is rejected until the user has
// interacted with the page. We satisfy that with a visible overlay
// the viewer clicks once. After that, all subsequent /events-driven
// play/pause calls work normally.
let userJoined = false;
function dismissJoin() {
  userJoined = true;
  joinEl.classList.add('hidden');
}
// Join overlay click is gated: ignored until the .ready class is set
// (by the buffer-progress poll below). This prevents the autoplay-
// policy user gesture from firing while buffer is still accumulating,
// which would race v.play() against a half-prepared stream.
joinEl.addEventListener('click', () => {
  if (!joinEl.classList.contains('ready')) return;
  if (lastState && lastState.ratingKey) {
    const target = targetFromState(lastState);
    if (isFinite(target) && Math.abs(v.currentTime - target) > DRIFT) {
      applying = true;
      v.currentTime = target;
      setTimeout(() => { applying = false; }, 250);
    }
  }
  tryPlayWhenReady();
  dismissJoin();
});
joinEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); joinEl.click(); }
});

// Drive the overlay's progress ring + label based on bufferedAhead().
// While buffer < MIN_BUFFER_BEFORE_PLAY: ring fills, label says
// "Warming the projector…", clicks are no-ops. Once full: ring goes
// solid ember, label switches to "Take your seat.", click is accepted.
const joinLabel = joinEl.querySelector('.label');
const joinHint  = joinEl.querySelector('.hint');
const joinRingFill = joinEl.querySelector('.ring .fill');
// 2πr where r=46 → ring circumference. dashoffset = circumference *
// (1 - progress); 0 = full ring, circumference = empty ring.
const JOIN_RING_CIRC = 2 * Math.PI * 46;
// Track fill rate so we can show ETA and detect "stuck buffer" cases.
let lastAhead = 0;
let lastAheadAt = Date.now();
let aheadRate = 0; // seconds-of-buffer per wall-second
function refreshJoinOverlay() {
  if (userJoined) return;
  const ahead = bufferedAhead();
  const now = Date.now();
  const wallDelta = (now - lastAheadAt) / 1000;
  if (wallDelta >= 1.0) {
    aheadRate = (ahead - lastAhead) / wallDelta;
    lastAhead = ahead;
    lastAheadAt = now;
    console.log('preroll: ahead=' + ahead.toFixed(2) + 's' +
                ' fillRate=' + aheadRate.toFixed(2) + 'x' +
                ' buffered=' + (v.buffered.length ?
                  '[' + v.buffered.start(0).toFixed(1) + '..' +
                  v.buffered.end(v.buffered.length - 1).toFixed(1) + ']' :
                  'none') +
                ' v.currentTime=' + v.currentTime.toFixed(2));
  }
  const ready = ahead >= MIN_BUFFER_BEFORE_PLAY;
  const p = Math.min(1, ahead / MIN_BUFFER_BEFORE_PLAY);
  joinRingFill.setAttribute('stroke-dashoffset', (JOIN_RING_CIRC * (1 - p)).toFixed(2));
  if (ready) {
    joinEl.classList.add('ready');
    joinLabel.textContent = 'Take your seat.';
    joinHint.textContent  = 'click anywhere to start';
  } else {
    joinEl.classList.remove('ready');
    joinLabel.textContent = 'Warming the projector…';
    let hint = ahead.toFixed(1) + 's / ' + MIN_BUFFER_BEFORE_PLAY + 's';
    if (aheadRate > 0.05) {
      const etaSec = Math.max(0, (MIN_BUFFER_BEFORE_PLAY - ahead) / aheadRate);
      hint += ' · ' + Math.ceil(etaSec) + 's left';
    }
    joinHint.textContent = hint;
  }
}
setInterval(refreshJoinOverlay, 250);
v.addEventListener('progress', refreshJoinOverlay);
v.addEventListener('playing', () => dismissJoin());
let loadedKey = null;     // ratingKey currently attached to the <video>
let applying = false;     // suppress echo while we apply server state
const DRIFT = 0.75;       // seconds of tolerable drift before a hard seek

function setStatus(text, kind) {
  syncEl.textContent = text;
  syncEl.classList.remove('locked', 'drifting');
  if (kind === 'locked') syncEl.classList.add('locked');
  if (kind === 'drifting') syncEl.classList.add('drifting');
}

// Outer-scoped so v.error handler (video decode failure) can ask
// hls.js to flush + reload around the bad position.
let hlsInstance = null;
// Track recovery attempts so we don't loop forever on a genuinely
// unplayable stream.
let mediaRecoveryAttempts = 0;
const MAX_MEDIA_RECOVERIES = 3;

function attach() {
  const src = '/hls/index.m3u8?ts=' + Date.now();

  // Quick capability probe — surface HEVC support up front so a Linux/Firefox
  // user sees a useful message instead of an empty player.
  const hevcMaybe = MediaSource.isTypeSupported
    && MediaSource.isTypeSupported('video/mp4; codecs="hvc1.2.4.L150.B0"');
  console.log('player: native HLS =', v.canPlayType('application/vnd.apple.mpegurl'),
              ' MSE HEVC =', hevcMaybe);

  // Prefer hls.js over the browser's native HLS player whenever it's
  // supported. Chrome on macOS reports canPlayType('...mpegurl') as
  // 'maybe' and tries to use VideoToolbox under the hood — that path
  // has been buggy for us: empty v.seekable on EVENT playlists, and
  // occasional decoder bad-data errors mid-segment. hls.js gives us a
  // predictable MSE-driven pipeline plus the playlist rewriter below.
  // Only fall back to native HLS if hls.js isn't supported (very old
  // browsers, or iOS Safari where MSE is restricted).
  if (window.Hls && Hls.isSupported()) {
    // Rewrite the playlist on every fetch: strip the EVENT type tag and
    // inject VOD instead. With VOD, hls.js sets MediaSource.duration to
    // the sum of fragment durations and the whole range becomes seekable
    // — which fixed our empty-v.seekable problem. We deliberately do NOT
    // inject #EXT-X-ENDLIST until ffmpeg actually finishes, so hls.js
    // keeps polling for newly-written segments.
    class VodPLoader extends Hls.DefaultConfig.loader {
      load(context, config, callbacks) {
        const origOnSuccess = callbacks.onSuccess;
        callbacks.onSuccess = (response, stats, ctx, net) => {
          if (typeof response.data === 'string' && response.data.includes('#EXTM3U')) {
            const before = response.data;
            response.data = before.replace(/#EXT-X-PLAYLIST-TYPE:EVENT/g,
                                          '#EXT-X-PLAYLIST-TYPE:VOD');
            const rewrote = response.data !== before;
            console.log('pLoader: playlist len=', response.data.length,
                        ' rewrote=', rewrote,
                        ' url=', context.url.split('/').pop());
          }
          origOnSuccess(response, stats, ctx, net);
        };
        super.load(context, config, callbacks);
      }
    }
    const hls = new Hls({
      // Buffer sized for 4K HEVC at 80 Mbps but conservative on the
      // ahead-of-playhead side to reduce MSE pressure on Chrome+
      // VideoToolbox. Each 1s of 80 Mbps content is ~10 MB; even with
      // generous limits the underlying VT decoder seems to choke when
      // the source buffer is under sustained eviction pressure.
      //   maxBufferLength 25: target 25s ahead during steady play
      //                       (must exceed MIN_BUFFER_BEFORE_PLAY=15
      //                       so hls.js actually fetches that much
      //                       before we attempt v.play())
      //   maxMaxBufferLength 45: hard cap
      //   backBufferLength 15: cheap scrub-back; older is refetched
      //                        from the (VOD) playlist as needed
      //   maxBufferSize 500MB: byte budget headroom
      backBufferLength: 15,
      maxBufferLength: 25,
      maxMaxBufferLength: 45,
      maxBufferSize: 500 * 1024 * 1024,
      // High-bitrate decode can stall briefly under load. 20 s of
      // patience before declaring starvation; plenty of time for the
      // next 2s segment to arrive.
      maxStarvationDelay: 20,
      maxLoadingDelay: 20,
      pLoader: VodPLoader,
    });
    const seekableStr = () => {
      const r = [];
      for (let i = 0; i < v.seekable.length; i++) {
        r.push(v.seekable.start(i).toFixed(1) + '..' + v.seekable.end(i).toFixed(1));
      }
      return '[' + r.join(', ') + ']';
    };
    hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
      console.log('hls manifest parsed: levels=', data.levels.length,
                  ' v.duration=', v.duration,
                  ' v.seekable=', seekableStr());
    });
    hls.on(Hls.Events.LEVEL_LOADED, (_, data) => {
      const d = data.details || {};
      console.log('hls level loaded:',
                  ' live=', d.live,
                  ' type=', d.type,
                  ' totalDur=', d.totalduration ? d.totalduration.toFixed(1) : '?',
                  ' fragments=', d.fragments ? d.fragments.length : '?',
                  ' endList=', d.endList,
                  ' v.duration=', v.duration,
                  ' v.seekable=', seekableStr());
    });
    // bufferFullError fires constantly on high-bitrate 4K HEVC because
    // hls.js targets a buffer length that exceeds Chrome's MSE byte
    // quota at this bitrate. hls.js's automatic eviction handles it
    // cleanly; logging each occurrence with a stack trace is just
    // noise. Rate-limit to one summary line per 30s.
    let bufferFullCount = 0;
    let lastBufferFullLogMs = 0;
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (!data.fatal) {
        if (data.details === 'bufferFullError') {
          bufferFullCount++;
          if (Date.now() - lastBufferFullLogMs > 30000) {
            console.log('hls.js: bufferFullError ×' + bufferFullCount +
                        ' in last 30s (hls.js handles via auto-eviction)');
            lastBufferFullLogMs = Date.now();
            bufferFullCount = 0;
          }
          return;
        }
        // Other non-fatal errors: one-line warn, no stack trace expansion.
        console.log('hls.js non-fatal:', data.details, data.reason || '');
        return;
      }
      console.error('hls.js FATAL error', data);
      // Try the documented recovery path for fatal media errors before
      // giving up. A fresh source buffer often gets past one-off
      // decoder bad-data frames (e.g. VideoToolbox HEVC quirks).
      if (data.type === 'mediaError' && mediaRecoveryAttempts < MAX_MEDIA_RECOVERIES) {
        mediaRecoveryAttempts++;
        console.warn('attempting hls.recoverMediaError() (#' + mediaRecoveryAttempts + ')');
        hls.recoverMediaError();
        return;
      }
      const codecHint = !hevcMaybe
        ? '  (this browser lacks HEVC support — try Safari, or Chrome on macOS / Windows w/ HEVC extension)'
        : '';
      setStatus('player error: ' + (data.details || data.type) + codecHint);
    });
    hls.loadSource(src);
    hls.attachMedia(v);
    hlsInstance = hls;
    return;
  }
  v.src = src;
}

v.addEventListener('error', () => {
  const err = v.error;
  console.error('video element error', err);
  if (!err) return;
  // MEDIA_ERR_DECODE (code 3): the underlying decoder rejected a frame.
  // On macOS Chrome + Safari this is overwhelmingly VideoToolbox hitting
  // a HEVC frame it doesn't like (e.g. a SEI message that slipped past
  // our strip, an unusual bitstream feature, or sustained pressure on
  // the hardware path). hls.recoverMediaError() flushes MSE and reloads
  // around the current position — often gets us past a one-off frame.
  if (err.code === 3 && hlsInstance && mediaRecoveryAttempts < MAX_MEDIA_RECOVERIES) {
    mediaRecoveryAttempts++;
    console.warn('video decode error — attempting recoverMediaError() (#'
                 + mediaRecoveryAttempts + ')');
    setStatus('recovering from decoder hiccup…');
    hlsInstance.recoverMediaError();
    return;
  }
  setStatus('video error: ' + err.code + ' ' + (err.message || ''));
});

v.addEventListener('seeking', () => console.log('video seeking → currentTime=', v.currentTime.toFixed(2)));
v.addEventListener('seeked',  () => console.log('video seeked  → currentTime=', v.currentTime.toFixed(2)));
// Whole-truth playback event logging — playback stops "by itself" can
// be any of: explicit pause(), `waiting` (buffer ran dry), `stalled`
// (no data appearing), `ended`, `ratechange` to 0, or a decoder
// hitting capacity. Each event tells a different story.
v.addEventListener('play',       () => console.log('video EVENT: play       currentTime=', v.currentTime.toFixed(2)));
// Reset recovery attempts after 30s of clean playback so we have a
// fresh budget if the decoder hiccups again later in the movie.
let lastSuccessfulPlayMs = 0;
v.addEventListener('playing', () => {
  lastSuccessfulPlayMs = Date.now();
  setTimeout(() => {
    if (Date.now() - lastSuccessfulPlayMs >= 30000 && mediaRecoveryAttempts > 0) {
      console.log('30s clean playback — resetting decode recovery counter');
      mediaRecoveryAttempts = 0;
    }
  }, 30000);
});
v.addEventListener('pause',      () => console.log('video EVENT: pause      currentTime=', v.currentTime.toFixed(2)));
v.addEventListener('waiting',    () => console.log('video EVENT: waiting    currentTime=', v.currentTime.toFixed(2),
                                                   ' readyState=', v.readyState,
                                                   ' bufferedEnd=', v.buffered.length ? v.buffered.end(v.buffered.length-1).toFixed(2) : 'none'));
v.addEventListener('stalled',    () => console.log('video EVENT: stalled    currentTime=', v.currentTime.toFixed(2)));
v.addEventListener('canplay',    () => console.log('video EVENT: canplay    currentTime=', v.currentTime.toFixed(2)));
v.addEventListener('canplaythrough', () => console.log('video EVENT: canplaythrough'));
v.addEventListener('ended',      () => console.log('video EVENT: ended      currentTime=', v.currentTime.toFixed(2)));
v.addEventListener('ratechange', () => console.log('video EVENT: ratechange playbackRate=', v.playbackRate));

// Pre-roll buffer gate. Without this, the first SSE-driven play() can
// fire when hls.js has only loaded a single 6 s segment (because
// ffmpeg has just started and the playlist refresh interval is longer
// than the segment). Playback then runs dry mid-segment, hls.js emits
// bufferStalledError, and we sit in the gap until the next playlist
// poll. Solution: only allow play() once we have enough lookahead to
// cover at least one full playlist refresh cycle.
// 10 s of pre-roll, matched to Plex's transcoder segment size. Plex
// emits keyframes every ~10 s, and ffmpeg's stream-copy can't split
// mid-GOP — so what we end up serving is 10 s HLS fragments even
// though our -hls_time is set to 2. With this segment size:
//
//   - The first playlist hls.js sees has exactly one fragment
//     (10.4 s). hls.js loads it and stops, then waits for the next
//     playlist refresh (~3-6 s later) to see more.
//   - A 15 s preroll would require waiting through that refresh cycle
//     — visibly stuck on "10.4 / 15 s" for several seconds.
//   - 10 s aligns with one segment, so as soon as the first segment
//     downloads, we're ready. Subsequent segments are produced fast
//     enough by Plex's HW transcoder (2-3× realtime) that we never
//     run dry during playback.
//
// If your Plex outputs shorter segments (some configs do), this could
// safely be lower. If your transcoder is slow (CPU-only), bump higher.
const MIN_BUFFER_BEFORE_PLAY = 10;
let playWaitTimer = null;
function bufferedAhead() {
  if (v.buffered.length === 0) return 0;
  return v.buffered.end(v.buffered.length - 1) - v.currentTime;
}
function tryPlayWhenReady() {
  if (!v.paused) return;
  const ahead = bufferedAhead();
  if (ahead >= MIN_BUFFER_BEFORE_PLAY) {
    console.log('play: buffered=' + ahead.toFixed(1) + 's, starting');
    v.play().catch((e) => console.warn('play() rejected:', e));
    return;
  }
  // Not enough buffer yet — show a holding status and re-check soon.
  // We don't loop forever: timer is cleared on real progress events.
  setStatus('buffering · ' + ahead.toFixed(1) + 's / ' + MIN_BUFFER_BEFORE_PLAY + 's');
  if (playWaitTimer) clearTimeout(playWaitTimer);
  playWaitTimer = setTimeout(tryPlayWhenReady, 500);
}
v.addEventListener('progress', () => {
  // hls.js appended new data — if we're holding for buffer, re-check.
  if (playWaitTimer && bufferedAhead() >= MIN_BUFFER_BEFORE_PLAY) {
    clearTimeout(playWaitTimer);
    playWaitTimer = null;
    tryPlayWhenReady();
  }
});

function post(action, extra) {
  fetch('/control', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({action}, extra||{}))
  });
}

// --- apply authoritative server state ---------------------------------------
// Latest known state from the server. We hold onto it so a periodic
// drift-correction tick (below) can extrapolate where playback SHOULD
// be at any moment, not just on the moments SSE pushes a change.
let lastState = null;

function targetFromState(s) {
  if (!s) return null;
  let t = s.positionSec;
  if (s.playing) t += (Date.now() - s.updatedAtMs) / 1000;
  return t;
}

// Host's player is the source of truth for its own playback. We only
// auto-seek it ONCE (the very first state we receive — useful when
// the host refreshes their tab mid-movie and we want to resume them
// at the right position). After that, host's v.currentTime is law,
// and we instead push the host's actual position back to the server
// (see broadcastHostPosition below) so viewers can sync to reality.
let firstStateApplied = false;

function applyState(s, reason) {
  if (lastLocalActionMs && s.updatedAtMs && s.updatedAtMs < lastLocalActionMs - 500) {
    console.log('ignoring stale state @', s.updatedAtMs, '(local action @', lastLocalActionMs, ')');
    return;
  }
  lastState = s;
  if (!s.ratingKey) {
    // Session ended (idle shutdown or host cleared). The server will
    // now serve waiting.html at /watch — reload so we land there.
    window.location.reload();
    return;
  }
  titleEl.textContent = s.title;
  titleEl.classList.remove('idle');
  if (typeof s.durationSec === 'number' && s.durationSec > 0) {
    serverDuration = s.durationSec;
    updateScrub();
  }

  if (s.ratingKey !== loadedKey) { loadedKey = s.ratingKey; attach(); }

  const target = targetFromState(s);
  applying = true;
  const shouldCorrect = !isHost || !firstStateApplied;
  if (shouldCorrect && Math.abs(v.currentTime - target) > DRIFT && isFinite(target)) {
    if (reason) console.log('apply', reason, '→ seek', target.toFixed(2));
    v.currentTime = target;
  }
  firstStateApplied = true;
  if (s.playing && v.paused) tryPlayWhenReady();
  if (!s.playing && !v.paused) v.pause();
  setTimeout(() => { applying = false; }, 250);

  const drift = v.currentTime - target;
  if (isHost) {
    // The host IS the source of truth — measuring drift against the
    // server's extrapolation of the host's own position is circular,
    // and the small value (sub-second) just reflects browser media-
    // pipeline latency. Show role label instead.
    syncEl.textContent = 'host';
    syncEl.classList.remove('drifting');
    syncEl.classList.add('locked');
  } else {
    syncEl.textContent = 'drift ' + drift.toFixed(2) + 's';
    syncEl.classList.toggle('drifting', Math.abs(drift) > DRIFT / 2);
    syncEl.classList.toggle('locked',   Math.abs(drift) <= DRIFT / 2);
  }
}

const es = new EventSource('/events');
es.onmessage = (e) => applyState(JSON.parse(e.data), 'sse');

// Periodic drift correction. SSE only fires on state changes, so a
// viewer who joins mid-playback and gets stuck on the autoplay
// overlay can fall arbitrarily far behind by the time they click.
// This tick re-applies the extrapolated state every 2 s while the
// host is playing, hard-seeking when drift exceeds DRIFT.
let tickCount = 0;
setInterval(() => {
  tickCount++;
  if (!lastState) {
    if (tickCount % 5 === 0) console.log('drift tick: no state yet');
    return;
  }
  if (!lastState.ratingKey) return;
  if (!lastState.playing) {
    // Paused or idle. Still update the indicator so the user sees
    // the current intent, just don't try to correct anything.
    syncEl.textContent = 'paused';
    syncEl.classList.remove('drifting', 'locked');
    return;
  }
  const target = targetFromState(lastState);
  if (!isFinite(target)) return;
  const drift = v.currentTime - target;

  // Always update the visible indicator. For the host this stays at
  // "host" (drift against own extrapolation is meaningless); for
  // viewers it's the live numeric value with locked/drifting state.
  if (isHost) {
    syncEl.textContent = 'host';
    syncEl.classList.remove('drifting');
    syncEl.classList.add('locked');
  } else {
    syncEl.textContent = 'drift ' + drift.toFixed(2) + 's';
    syncEl.classList.toggle('drifting', Math.abs(drift) > DRIFT / 2);
    syncEl.classList.toggle('locked',   Math.abs(drift) <= DRIFT / 2);
  }

  // Host: never auto-correct. Host's v.currentTime is the source of
  // truth — if their 4K HEVC decoder is lagging, we DO NOT want to
  // hard-seek forward (it'd cause visible skips). Instead, the
  // broadcastHostPosition tick below pushes the host's actual
  // position back to the server, so viewers sync to reality.
  if (isHost) return;

  if (applying) {
    if (tickCount % 5 === 0) console.log('drift tick: still applying, skip correction');
    return;
  }
  if (v.paused) {
    if (tickCount % 5 === 0) console.log('drift tick: v.paused but state.playing — autoplay blocked?');
    return;
  }
  if (Math.abs(drift) > DRIFT) {
    const seekable = [];
    for (let i = 0; i < v.seekable.length; i++) {
      seekable.push(v.seekable.start(i).toFixed(1) + '..' + v.seekable.end(i).toFixed(1));
    }
    const before = v.currentTime;
    console.log('drift tick: correcting', drift.toFixed(2), 's → seek', target.toFixed(2),
                ' (seekable=[' + seekable.join(', ') + '])');
    applying = true;
    v.currentTime = target;
    setTimeout(() => {
      const after = v.currentTime;
      console.log('drift tick: after seek currentTime=', after.toFixed(2),
                  ' (moved by', (after - before).toFixed(2), 's)');
      applying = false;
    }, 250);
  }
}, 2000);

// NOTE: previously we ran a "host position broadcast" tick that
// periodically pushed the host's v.currentTime to the server so
// viewers would track the host's actual playback (in case decode
// lag made server's 1× extrapolation diverge). We removed it
// because hls.js occasionally resets v.currentTime to 0 during
// internal playlist/buffer maintenance, and even with stability
// checks the tick eventually trusted a bogus reading and
// broadcast it as a seek — producing the visible "seek storm"
// (state jumping 50 → 0 → 51 → 0 → 54 multiple times per second).
//
// Server state is now set by explicit host actions only:
//   * play / pause  → button presses
//   * seek          → scrub-bar drag (commitScrubSeek)
// Between actions, server extrapolates at 1×; viewers follow that
// extrapolation. If host's decoder runs at 0.97× the divergence
// after an hour is ~2 min — still vastly better than the chaos.
// A user-triggered scrub / pause re-anchors the state precisely.

// --- local controls broadcast to everyone -----------------------------------
// Viewers can't drive playback; their event echoes don't post.
//
// We intentionally do NOT echo `seeked` events. hls.js fires `seeked`
// on its own internal seeks (playlist updates, buffer rewinds during
// recovery, etc.) and treating each one as "the user wants to seek"
// floods the server with bogus state updates. The scrub-bar path
// (commitScrubSeek) is the only entry point that posts a seek; the
// host-position-broadcast tick keeps the server's view aligned with
// natural playback drift.
document.getElementById('play').onclick  = () => { if (isHost) post('play'); };
document.getElementById('pause').onclick = () => { if (isHost) post('pause'); };
v.addEventListener('play',  () => { if (isHost && !applying) post('play');  });
v.addEventListener('pause', () => { if (isHost && !applying) post('pause'); });
</script>
</body>
</html>
