<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Late Show · admin sign-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --ink:        #0f1217;
    --ink-2:      #1a1e24;
    --ink-3:      #11141a;
    --paper:      #e8ecf2;
    --paper-mute: #5e6878;
    --paper-dim:  #4a5260;
    --rule:       #2a323e;
    --signal:     #9fe6ad;
    --warn:       #f0a830;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--ink-3); color: var(--paper); }
  body {
    font-family: var(--mono);
    display: grid;
    place-items: center;
    padding: 2rem;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.01) 0 1px, transparent 1px 3px),
      linear-gradient(180deg, var(--ink-2) 0%, var(--ink-3) 100%);
  }
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(900px 600px at 50% 38%, rgba(240,168,48,0.05), transparent 70%);
  }
  main {
    width: min(440px, 100%);
    position: relative; z-index: 1;
    animation: rise .9s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  .marquee {
    font-family: var(--mono); font-weight: 500;
    font-size: .62rem; letter-spacing: .35em;
    color: var(--paper-mute); text-transform: uppercase;
    display: flex; align-items: center; gap: .8rem;
    margin-bottom: 3.5rem;
  }
  .marquee::before, .marquee::after {
    content: ''; flex: 1; height: 1px; background: var(--rule);
  }
  h1 {
    margin: 0 0 .35rem;
    font-family: var(--mono); font-weight: 600;
    font-size: clamp(1.8rem, 5vw, 2.5rem); line-height: 1.05;
    letter-spacing: .02em; color: var(--paper);
    text-transform: uppercase;
  }
  h1::before { content: '// '; color: var(--warn); font-weight: 400; }
  .sub {
    font-family: var(--mono); font-weight: 500;
    font-size: .68rem; letter-spacing: .25em;
    text-transform: uppercase; color: var(--paper-mute);
    margin: 0 0 2.5rem;
  }
  form { margin: 0; }
  button {
    width: 100%;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px),
      linear-gradient(180deg, #1d2129 0%, #131820 100%);
    border: 1px solid var(--warn);
    color: var(--warn);
    font-family: var(--mono); font-weight: 600;
    font-size: .8rem; letter-spacing: .28em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 1rem 1.2rem;
    border-radius: 2px;
    transition: all .2s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 0 14px rgba(240,168,48,.18);
    display: flex; align-items: center; justify-content: center; gap: .75rem;
  }
  button:hover {
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.014) 0 1px, transparent 1px 3px),
      linear-gradient(180deg, #252b34 0%, #1a1f27 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 0 20px rgba(240,168,48,.4);
  }
  .gicon {
    width: 18px; height: 18px;
    display: inline-block; flex-shrink: 0;
  }
  .note {
    margin-top: 2rem;
    padding: .75rem 1rem;
    border-left: 2px solid var(--rule);
    font-family: var(--mono);
    font-size: .68rem; line-height: 1.6;
    letter-spacing: .04em;
    color: var(--paper-mute);
  }
  .note::before { content: '// '; color: var(--signal); }
  .footer {
    margin-top: 3rem;
    padding-top: 1.4rem;
    border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between;
    font-family: var(--mono); font-weight: 500;
    font-size: .58rem; letter-spacing: .3em;
    text-transform: uppercase; color: var(--paper-mute);
  }
  .footer a {
    color: var(--paper); text-decoration: none;
    transition: color .2s ease;
  }
  .footer a:hover { color: var(--signal); }
</style>
</head>
<body>
<main>
  <div class="marquee">Late Show · Console · Admin</div>
  <h1>Restricted.</h1>
  <p class="sub">maintenance panel · google sign-in required</p>
  <form method="post" action="/admin/oauth/start">
    <button type="submit">
      <svg class="gicon" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>
  </form>
  <div class="note">
    Admin access is gated by a Google email allowlist set on the
    server. If your account isn't on it, you'll get a "not authorized"
    response after sign-in.
  </div>
  <div class="footer">
    <span>Late Show · Console</span>
    <a href="/">← back to library</a>
  </div>
</main>
</body>
</html>
