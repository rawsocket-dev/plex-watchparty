<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Late Show · sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --ink:        #0f1217;
    --ink-2:      #1a1e24;
    --ink-3:      #11141a;
    --paper:      #e8ecf2;
    --paper-mute: #5e6878;
    --paper-dim:  #4a5260;
    --rule:       #2a323e;
    --rule-hi:    #3a424e;
    --signal:     #9fe6ad;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--ink-3); color: var(--paper); }
  body {
    font-family: var(--mono);
    display: grid;
    place-items: center;
    padding: 2rem;
    overflow: hidden;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.01) 0 1px, transparent 1px 3px),
      linear-gradient(180deg, var(--ink-2) 0%, var(--ink-3) 100%);
  }
  /* Mint vignette so the panel sits in a soft pool of console light. */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(900px 600px at 50% 38%, rgba(159,230,173,0.05), transparent 70%);
    pointer-events: none;
  }
  main {
    width: min(440px, 100%);
    position: relative;
    z-index: 1;
    animation: rise .9s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .marquee {
    font-family: var(--mono);
    font-weight: 500;
    font-size: .62rem;
    letter-spacing: .35em;
    color: var(--paper-mute);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: .8rem;
    margin-bottom: 3.5rem;
  }
  .marquee::before, .marquee::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--rule);
  }

  h1 {
    margin: 0 0 .35rem;
    font-family: var(--mono);
    font-weight: 600;
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    line-height: 1.05;
    letter-spacing: .02em;
    color: var(--paper);
    text-transform: uppercase;
  }
  h1::before { content: '// '; color: var(--signal); font-weight: 400; }
  .sub {
    font-family: var(--mono);
    font-weight: 500;
    font-size: .68rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--paper-mute);
    margin: 0 0 2.5rem;
  }

  form { margin: 0; }
  .field {
    position: relative;
    display: flex;
    align-items: center;
    gap: .7rem;
    background: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: .75rem 1rem;
    box-shadow: inset 0 0 14px rgba(0,0,0,.45);
    transition: border-color .25s ease, box-shadow .25s ease;
  }
  .field:focus-within {
    border-color: var(--signal);
    box-shadow: inset 0 0 14px rgba(0,0,0,.45), 0 0 12px rgba(159,230,173,.25);
  }
  .field::before {
    content: '$';
    font-family: var(--mono);
    color: var(--signal);
    font-size: .9rem;
    font-weight: 500;
  }
  input[type="text"], input[type="password"] {
    flex: 1;
    background: transparent;
    border: 0;
    outline: 0;
    color: var(--paper);
    font-family: var(--mono);
    font-size: .95rem;
    letter-spacing: .12em;
    padding: 0;
    caret-color: var(--signal);
  }
  input::placeholder {
    color: var(--paper-mute);
    letter-spacing: .18em;
    text-transform: lowercase;
    opacity: .55;
  }
  .field + .field { margin-top: .5rem; }

  .row {
    margin-top: 1.6rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .hint {
    font-family: var(--mono);
    font-weight: 500;
    font-size: .62rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--paper-mute);
  }
  button {
    background: linear-gradient(180deg, #9fe6ad 0%, #6ab37d 100%);
    border: 1px solid var(--signal);
    color: var(--ink);
    font-family: var(--mono);
    font-weight: 600;
    font-size: .72rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    cursor: pointer;
    padding: .6rem 1.3rem;
    border-radius: 2px;
    transition: all .2s ease;
    box-shadow: 0 0 12px rgba(159,230,173,.3), inset 0 1px 0 rgba(255,255,255,.2);
    display: inline-flex;
    align-items: center;
    gap: .5rem;
  }
  button:hover {
    background: linear-gradient(180deg, #b8efc4 0%, #7ec491 100%);
    box-shadow: 0 0 18px rgba(159,230,173,.55), inset 0 1px 0 rgba(255,255,255,.25);
  }
  button .arrow {
    display: inline-block;
    transition: transform .25s cubic-bezier(.2,.7,.2,1);
  }
  button:hover .arrow { transform: translateX(.35rem); }
</style>
</head>
<body>
<main>
  <div class="marquee">Late Show · Console · Est. MMXXVI</div>
  <h1>Sign in.</h1>
  <p class="sub">a private screening — password required</p>
  <form method="post" action="/login">
    <label class="field">
      <input type="text" name="name" placeholder="your name" autofocus autocomplete="nickname" maxlength="16" pattern="[\x20-\x7e]+" title="16 chars max, printable ASCII only">
    </label>
    <label class="field">
      <input type="password" name="password" placeholder="passphrase" autocomplete="current-password">
    </label>
    <div class="row">
      <span class="hint">shared with the party</span>
      <button type="submit">Enter <span class="arrow">→</span></button>
    </div>
  </form>
</main>
</body>
</html>
