<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Late Show · sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: dark;
    --bg:         #08080b;
    --surface:    #0c0c10;
    --ink:        #ECECF2;
    --ink-mute:   #8a8a99;
    --ink-faint:  #5b5b6a;
    --accent:     #7a5cff;
    --accent-lt:  #9a7bff;
    --lilac:      #b9a6ff;
    --teal:       #5fd0c5;
    --warn:       #ff9a7a;
    --hairline:   rgba(255,255,255,.08);
    --display: "Space Grotesk", system-ui, sans-serif;
    --body:    "Hanken Grotesk", system-ui, sans-serif;
    --mono:    "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--surface); color: var(--ink); }
  body {
    font-family: var(--body);
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: 2rem;
    /* Two radial glows: violet top-right, faint teal bottom-left. */
    background:
      radial-gradient(700px 460px at 70% 20%, rgba(123,92,255,.22), transparent 60%),
      radial-gradient(600px 400px at 20% 90%, rgba(95,208,197,.1), transparent 60%),
      var(--surface);
  }
  main {
    width: min(430px, 100%);
    position: relative;
    z-index: 1;
    padding: 40px;
    border-radius: 18px;
    background: rgba(21,21,28,.7);
    border: 1px solid var(--hairline);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 24px 60px rgba(0,0,0,.4);
    animation: rise .9s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
  }
  .brand .mark {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(140deg, var(--accent), var(--teal));
    display: grid; place-items: center;
    color: var(--surface);
    font: 700 16px var(--display);
  }
  .brand .name {
    font: 600 16px var(--display);
    color: var(--ink);
    letter-spacing: .01em;
  }

  h1 {
    margin: 0;
    font: 600 32px/1.1 var(--display);
    color: var(--ink);
  }
  .sub {
    font: 400 14px/1.6 var(--body);
    color: var(--ink-mute);
    margin: 14px 0 0;
  }
  /* Denied notice — toggled by the inline script on ?error=denied. */
  #denied {
    color: var(--warn);
    font: 500 13px/1.5 var(--body);
    margin: 14px 0 0;
  }

  form { margin: 0; }
  button {
    margin-top: 26px;
    width: 100%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--ink);
    color: var(--surface);
    border: none;
    border-radius: 11px;
    padding: 15px;
    font: 600 14px var(--body);
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  button:hover { filter: brightness(1.05); box-shadow: 0 8px 22px rgba(0,0,0,.35); }
  button:active { transform: translateY(1px); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  button .g {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(140deg, var(--accent), var(--teal));
    color: #fff;
    display: grid; place-items: center;
    font: 700 12px var(--display);
  }

  .footnote {
    margin-top: 20px;
    text-align: center;
    font: 500 11px var(--mono);
    letter-spacing: .12em;
    color: var(--ink-faint);
  }
</style>
</head>
<body>
<main>
  <div class="brand">
    <span class="mark">L</span>
    <span class="name">Late Show</span>
  </div>
  <h1>Movie night,<br>in sync.</h1>
  <p class="sub">Sign in with Google. Access is gated by an email allowlist — no Plex account needed.</p>
  <p id="denied" hidden>That account isn't on the guest list.</p>
  <form method="post" action="/oauth/start">
    <button type="submit"><span class="g">G</span> Continue with Google</button>
  </form>
  <div class="footnote">ALLOWLISTED GUESTS ONLY</div>
</main>
<script>
  if (location.search.indexOf('error=denied') >= 0) document.getElementById('denied').hidden = false;
</script>
</body>
</html>
