services:
  watchparty:
    # Pulls the published multi-arch image from GitHub Container Registry
    # by default (`docker compose pull && docker compose up -d`). To build
    # from source instead, run `docker compose up --build`, which uses the
    # local Dockerfile.
    image: ghcr.io/rawsocket-dev/plex-watchparty:latest
    build: .
    ports:
      - "8080:8080"
    # All configuration lives in .env — copy .env.example to .env and edit it.
    # env_file injects every KEY=VALUE from .env into the container, so adding
    # a new setting only needs a line in .env, not an edit here. See
    # .env.example for the full list with docs.
    env_file:
      - .env
    environment:
      # Container-internal data dir (cache + work files), persisted via the
      # ./data volume below. A fixed path, not a user-facing setting.
      WORK_DIR: /data/sessions
    volumes:
      - ./data:/data
    restart: unless-stopped
