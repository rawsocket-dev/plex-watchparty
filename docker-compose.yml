services:
  watchparty:
    # Pulls the CI-built multi-arch image by default. Run
    # `docker compose pull` after `docker login` (see README) on the
    # first deploy. For local dev, `docker compose up --build` will
    # build from the local Dockerfile instead.
    image: registry.example.com:5050/example/plex-watchparty:latest
    build: .
    ports:
      - "8080:8080"
    environment:
      # Your Plex server (token stays server-side, never sent to clients).
      PLEX_BASE_URL: "http://host.docker.internal:32400"
      PLEX_TOKEN: "${PLEX_TOKEN:?set PLEX_TOKEN}"
      # Viewer password (everyone gets this — lets them watch).
      WATCH_PASSWORD: "${WATCH_PASSWORD:?set WATCH_PASSWORD}"
      # Optional host password — only the host knows this; lets them
      # pick / play / pause / seek. Omit (or set blank) to keep the
      # old "any friend can drive" behaviour.
      HOST_PASSWORD: "${HOST_PASSWORD:-}"
      # Optional Plex Universal Transcoder pass-through. When set to a
      # positive integer, every loaded movie is routed through Plex's
      # on-the-fly transcoder targeting 1080p h264 at this bitrate (in
      # kbps). Plex handles HEVC→h264 + HDR→SDR (with hardware
      # acceleration if configured on the Plex side). Leave blank / unset
      # to direct-stream the original — fine for low-bitrate / h264
      # sources, painful for 4K HDR HEVC remuxes.
      # 12000 = 12 Mbps, a sensible default for high-quality streaming.
      PLEX_TRANSCODE_BITRATE_KBPS: "${PLEX_TRANSCODE_BITRATE_KBPS:-}"
      # Disk cap for the HLS segment cache (Gigabytes). Cached segments
      # survive container restarts so previously-watched parts of a movie
      # are instant-seekable on next watch. LRU eviction kicks in when
      # the cap is hit. 20 GB fits ~3 typical 2hr movies at 12 Mbps.
      CACHE_MAX_GB: "${CACHE_MAX_GB:-20}"
      # Root data directory for cache and work files. Persisted outside
      # the container layer so cached segments survive restarts.
      WORK_DIR: /data/sessions
      # Optional Google OAuth gate for the /admin maintenance panel.
      # Set all four to enable; if any are blank, /admin routes are not
      # registered and the panel is 404. See README for the Google Cloud
      # console steps to create the OAuth 2.0 Client ID.
      ADMIN_GOOGLE_CLIENT_ID:       "${ADMIN_GOOGLE_CLIENT_ID:-}"
      ADMIN_GOOGLE_CLIENT_SECRET:   "${ADMIN_GOOGLE_CLIENT_SECRET:-}"
      ADMIN_GOOGLE_REDIRECT_URL:    "${ADMIN_GOOGLE_REDIRECT_URL:-}"
      # Comma-separated email allowlist (lowercased server-side).
      # Anyone NOT in this list gets a 403 after Google sign-in.
      ADMIN_GOOGLE_ALLOWED_EMAILS:  "${ADMIN_GOOGLE_ALLOWED_EMAILS:-}"
    volumes:
      - ./data:/data
    restart: unless-stopped
